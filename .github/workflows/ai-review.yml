name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR Diff
        run: git diff origin/${{ github.base_ref }}...HEAD > pr_diff.txt

      - name: AI Review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          pip install anthropic requests -q
          python3 - << 'PYEOF'
          import anthropic, requests, os
          diff = open("pr_diff.txt").read()[:15000]
          client = anthropic.Anthropic(api_key=os.environ["ANTHROPIC_API_KEY"])
          message = client.messages.create(
            model="claude-sonnet-4-5",
              max_tokens=1500,
              messages=[{
                  "role": "user",
                  "content": "אתה מפתח בכיר. בדוק את הקוד הבא ותן סקירה בעברית:\n\n" + diff
              }]
          )
          review_text = message.content[0].text
          comment = "## AI Code Review\n\n" + review_text + "\n\n---\n*נוצר אוטומטית על ידי Claude*"
          requests.post(
              f"https://api.github.com/repos/{os.environ['REPO']}/issues/{os.environ['PR_NUMBER']}/comments",
              headers={"Authorization": f"Bearer {os.environ['GH_TOKEN']}", "Accept": "application/vnd.github+json"},
              json={"body": comment}
          )
          PYEOF
