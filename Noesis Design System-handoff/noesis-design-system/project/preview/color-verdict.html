<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>html,body{margin:0;background:var(--bg-base)}.stage{padding:22px 28px;min-height:110px;box-sizing:border-box;position:relative;z-index:1}</style></head><body><div class="stage">
<div style="display:flex;flex-direction:column;gap:10px">
  <div style="display:flex;gap:10px">
    <div class="verdict-card buy" style="flex:1"><div class="t-eyebrow" style="margin-bottom:6px">Attractive</div><div style="font-family:var(--font-wordmark);font-size:20px;letter-spacing:2px;color:var(--text-primary)">BUY</div></div>
    <div class="verdict-card hold" style="flex:1"><div class="t-eyebrow" style="margin-bottom:6px">Fairly valued</div><div style="font-family:var(--font-wordmark);font-size:20px;letter-spacing:2px;color:var(--text-primary)">HOLD</div></div>
    <div class="verdict-card reduce" style="flex:1"><div class="t-eyebrow" style="margin-bottom:6px">High expectations</div><div style="font-family:var(--font-wordmark);font-size:20px;letter-spacing:2px;color:var(--text-primary)">REDUCE</div></div>
    <div class="verdict-card avoid" style="flex:1"><div class="t-eyebrow" style="margin-bottom:6px">Speculative</div><div style="font-family:var(--font-wordmark);font-size:20px;letter-spacing:2px;color:var(--text-primary)">AVOID</div></div>
  </div>
  <div class="t-meta">No pastel fills. A 2px colored rail on the left + a mono badge does the work.</div>
</div></div></body></html>
