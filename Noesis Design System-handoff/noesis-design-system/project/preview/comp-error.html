<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>html,body{margin:0;background:var(--bg-base)}.stage{padding:22px 28px;min-height:110px;box-sizing:border-box;position:relative;z-index:1}</style></head><body><div class="stage">
<div style="display:flex;flex-direction:column;gap:10px;max-width:520px">
  <div style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:6px;background:var(--red-bg);border:1px solid var(--red-border);color:var(--red);font-family:var(--font-mono);font-size:11px;letter-spacing:.04em"><span>✕</span> No data found. Please check the ticker.</div>
  <div style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:6px;background:var(--green-bg);border:1px solid var(--green-border);color:var(--green);font-family:var(--font-mono);font-size:11px;letter-spacing:.04em"><span>✓</span> Analysis refreshed.</div>
</div></div></body></html>
