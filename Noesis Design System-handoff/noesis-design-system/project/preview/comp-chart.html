<!doctype html>
<html class="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; background:var(--bg-base) }
  .stage { padding: 22px 28px; min-height: 280px; position:relative; z-index:1 }
</style>
</head>
<body>
<div class="stage">
  <div class="card" style="padding:16px">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px">
      <div>
        <div class="t-eyebrow" style="margin-bottom:4px">AAPL · 12M</div>
        <div class="t-num-lg">$184.32</div>
      </div>
      <div style="text-align:right">
        <div class="t-eyebrow" style="margin-bottom:4px">Change</div>
        <div class="t-num-lg" style="color:#3ddc84">+22.4%</div>
      </div>
    </div>
    <div style="position:relative;height:160px">
      <svg viewBox="0 0 100 100" preserveAspectRatio="none" style="position:absolute;inset:0;width:100%;height:100%">
        <defs>
          <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="rgba(61,220,132,0.18)"/>
            <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
          </linearGradient>
        </defs>
        <line x1="0" x2="100" y1="22" y2="22" stroke="rgba(140,180,255,0.06)" stroke-width="0.25"/>
        <line x1="0" x2="100" y1="50" y2="50" stroke="rgba(140,180,255,0.06)" stroke-width="0.25"/>
        <line x1="0" x2="100" y1="78" y2="78" stroke="rgba(140,180,255,0.06)" stroke-width="0.25"/>
        <path d="M 0 70 L 8 66 L 16 72 L 24 60 L 32 65 L 40 50 L 48 55 L 56 42 L 64 38 L 72 30 L 80 35 L 88 22 L 100 18 L 100 100 L 0 100 Z" fill="url(#g1)"/>
        <path d="M 0 70 L 8 66 L 16 72 L 24 60 L 32 65 L 40 50 L 48 55 L 56 42 L 64 38 L 72 30 L 80 35 L 88 22 L 100 18" fill="none" stroke="#3ddc84" stroke-width="0.7" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="100" cy="18" r="1.2" fill="#3ddc84"/>
        <circle cx="100" cy="18" r="3" fill="#3ddc84" opacity="0.25"/>
      </svg>
      <div style="position:absolute;top:0;right:0;height:100%;width:56px;pointer-events:none">
        <div style="position:absolute;right:4px;top:22%;transform:translateY(-50%);font-family:var(--font-mono);font-size:9px;color:var(--text-muted);background:var(--bg-card);padding:0 4px">$192.4</div>
        <div style="position:absolute;right:4px;top:50%;transform:translateY(-50%);font-family:var(--font-mono);font-size:9px;color:var(--text-muted);background:var(--bg-card);padding:0 4px">$164.1</div>
        <div style="position:absolute;right:4px;top:78%;transform:translateY(-50%);font-family:var(--font-mono);font-size:9px;color:var(--text-muted);background:var(--bg-card);padding:0 4px">$148.7</div>
      </div>
    </div>
    <div style="display:flex;justify-content:space-between;margin-top:8px;font-family:var(--font-mono);font-size:9px;color:var(--text-muted);letter-spacing:.08em;text-transform:uppercase">
      <span>Jun</span><span>Aug</span><span>Oct</span><span>Dec</span><span>Feb</span><span>Apr</span>
    </div>
  </div>
</div>
</body>
</html>
