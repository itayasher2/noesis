<!doctype html>
<html class="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; background:var(--bg-base) }
  .stage { padding:0; min-height:320px; position:relative; z-index:1; display:flex; align-items:center; justify-content:center; padding:24px }
  .modal {
    width: 460px; max-width: 100%;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: 0 1px 0 rgba(255,255,255,0.04), 0 8px 32px rgba(0,0,0,0.6);
    overflow: hidden;
  }
  .modal-head {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-body { padding: 18px; }
  .modal-foot {
    padding: 12px 18px;
    border-top: 1px solid var(--border);
    background: var(--bg-subtle);
    display: flex; gap: 10px; justify-content: flex-end;
  }
  .modal-close {
    background: transparent; border: none; cursor: pointer;
    font-family: var(--font-mono); font-size: 10px;
    color: var(--text-muted); letter-spacing: 0.08em;
    padding: 4px 8px;
  }
  .modal-close:hover { color: var(--text-primary); }
</style>
</head>
<body>
<div class="stage">
  <div class="modal">
    <div class="modal-head">
      <div class="t-eyebrow">Confirm action</div>
      <button class="modal-close">✕ ESC</button>
    </div>
    <div class="modal-body">
      <div class="t-h2" style="margin-bottom:6px">Reset DCF assumptions</div>
      <div class="t-body-sm">This restores growth, WACC, and terminal rate to the base case. Your local edits will be lost.</div>
    </div>
    <div class="modal-foot">
      <button class="btn-ghost">Cancel</button>
      <button class="btn-brand">Reset ↺</button>
    </div>
  </div>
</div>
</body>
</html>
