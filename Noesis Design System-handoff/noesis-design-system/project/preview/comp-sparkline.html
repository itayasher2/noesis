<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>html,body{margin:0;background:var(--bg-base)}.stage{padding:22px 28px;min-height:110px;box-sizing:border-box;position:relative;z-index:1}</style></head><body><div class="stage">
<div style="display:flex;flex-direction:column;gap:12px">
  <div style="display:flex;gap:12px">
    <div class="card" style="padding:12px 16px;min-width:170px">
      <div class="t-eyebrow" style="margin-bottom:6px">AAPL · 1Y</div>
      <div style="display:flex;align-items:flex-end;gap:10px">
        <div class="t-num-lg">$184.32</div>
        <svg class="spark up" width="80" height="32" viewBox="0 0 100 32"><path d="M0 28 L15 22 L30 24 L45 14 L60 18 L75 8 L100 4"/></svg>
      </div>
      <div class="t-meta" style="color:var(--green);margin-top:4px">+22% YTD</div>
    </div>
    <div class="card" style="padding:12px 16px;min-width:170px">
      <div class="t-eyebrow" style="margin-bottom:6px">TSLA · 1Y</div>
      <div style="display:flex;align-items:flex-end;gap:10px">
        <div class="t-num-lg">$248.91</div>
        <svg class="spark down" width="80" height="32" viewBox="0 0 100 32"><path d="M0 4 L15 8 L30 6 L45 14 L60 18 L75 22 L100 28"/></svg>
      </div>
      <div class="t-meta" style="color:var(--red);margin-top:4px">−18% YTD</div>
    </div>
  </div>
  <div class="t-meta">2px-stroke sparklines, currentColor inherited from .spark.up / .spark.down.</div>
</div></div></body></html>
