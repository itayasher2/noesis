<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>html,body{margin:0;background:var(--bg-base)}.stage{padding:22px 28px;min-height:110px;box-sizing:border-box;position:relative;z-index:1}</style></head><body><div class="stage">
<div style="display:flex;gap:14px">
  <div style="display:flex;flex-direction:column;align-items:center;gap:8px;flex:1"><div style="width:70px;height:54px;background:var(--bg-card);border:1px solid var(--border);border-radius:0;box-shadow:var(--shadow)"></div><div class="t-meta"><b class="text-primary">0</b></div><div class="t-meta">sharp</div></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:8px;flex:1"><div style="width:70px;height:54px;background:var(--bg-card);border:1px solid var(--border);border-radius:6px;box-shadow:var(--shadow)"></div><div class="t-meta"><b class="text-primary">6</b></div><div class="t-meta">--radius-sm</div></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:8px;flex:1"><div style="width:70px;height:54px;background:var(--bg-card);border:1px solid var(--border);border-radius:10px;box-shadow:var(--shadow)"></div><div class="t-meta"><b class="text-primary">10</b></div><div class="t-meta">--radius · card</div></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:8px;flex:1"><div style="width:70px;height:30px;background:var(--bg-card);border:1px solid var(--border);border-radius:100px;box-shadow:var(--shadow)"></div><div class="t-meta"><b class="text-primary">pill</b></div><div class="t-meta">--radius-pill</div></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:8px;flex:1"><div style="width:40px;height:40px;background:var(--bg-card);border:1px solid var(--border);border-radius:50%;box-shadow:var(--shadow)"></div><div class="t-meta"><b class="text-primary">full</b></div><div class="t-meta">dot · avatar</div></div>
</div></div></body></html>
