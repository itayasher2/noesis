<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>html,body{margin:0;background:var(--bg-base)}.stage{padding:22px 28px;min-height:110px;box-sizing:border-box;position:relative;z-index:1}</style></head><body><div class="stage">
<div style="display:flex;flex-direction:column;gap:12px">
  <div style="display:flex;gap:12px">
    <div style="flex:1"><div style="height:54px;background:#00d4ff;border:1px solid var(--border);border-radius:6px;box-shadow:0 0 16px rgba(0,212,255,.25)"></div><div class="t-meta" style="margin-top:6px"><b class="text-primary">--accent</b></div><div class="t-meta">#00d4ff · cyan</div></div>
    <div style="flex:1"><div style="height:54px;background:#34e3ff;border:1px solid var(--border);border-radius:6px"></div><div class="t-meta" style="margin-top:6px"><b class="text-primary">--accent-2</b></div><div class="t-meta">#34e3ff</div></div>
    <div style="flex:1"><div style="height:54px;background:#07212c;border:1px solid var(--border);border-radius:6px"></div><div class="t-meta" style="margin-top:6px"><b class="text-primary">--accent-subtle</b></div><div class="t-meta">#07212c</div></div>
    <div style="flex:1"><div style="height:54px;background:linear-gradient(135deg,#00d4ff 0%,#0085ff 100%);border:1px solid var(--border);border-radius:6px"></div><div class="t-meta" style="margin-top:6px"><b class="text-primary">--gradient-brand</b></div><div class="t-meta">135° cyan</div></div>
    <div style="flex:1"><div style="height:54px;background:#3ddc84;border:1px solid var(--border);border-radius:6px;box-shadow:0 0 14px rgba(61,220,132,.3)"></div><div class="t-meta" style="margin-top:6px"><b class="text-primary">--brand-green</b></div><div class="t-meta">#3ddc84 · dot · BUY</div></div>
  </div>
  <div class="t-meta">Cyan = active states, focus, button outline. Green = brand mark + positive direction. Don't mix on one element.</div>
</div></div></body></html>
